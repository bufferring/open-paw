<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="paw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00f5d4" flood-opacity="0.4"/>
    </filter>
    <filter id="padglow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00f5d4" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#00f5d4" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Main paw pad (large oval) -->
  <ellipse cx="256" cy="320" rx="100" ry="80" fill="url(#paw)" filter="url(#shadow)" opacity="0.95"/>

  <!-- Terminal cursor blink inside main pad -->
  <rect x="236" y="300" width="16" height="40" rx="3" fill="#0f0c29" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Angle bracket > inside main pad -->
  <text x="260" y="332" font-family="monospace" font-size="36" font-weight="bold" fill="#0f0c29" opacity="0.7">›</text>

  <!-- Top paw toes (4 small circles with code symbols) -->
  <!-- Toe 1 - far left -->
  <ellipse cx="155" cy="210" rx="38" ry="45" fill="url(#paw)" filter="url(#padglow)" opacity="0.9" transform="rotate(-15, 155, 210)"/>
  <text x="145" y="218" font-family="monospace" font-size="22" font-weight="bold" fill="#0f0c29" opacity="0.6">{</text>

  <!-- Toe 2 - inner left -->
  <ellipse cx="218" cy="185" rx="36" ry="44" fill="url(#paw)" filter="url(#padglow)" opacity="0.9" transform="rotate(-5, 218, 185)"/>
  <text x="210" y="193" font-family="monospace" font-size="22" font-weight="bold" fill="#0f0c29" opacity="0.6">/</text>

  <!-- Toe 3 - inner right -->
  <ellipse cx="294" cy="185" rx="36" ry="44" fill="url(#paw)" filter="url(#padglow)" opacity="0.9" transform="rotate(5, 294, 185)"/>
  <text x="286" y="193" font-family="monospace" font-size="22" font-weight="bold" fill="#0f0c29" opacity="0.6">$</text>

  <!-- Toe 4 - far right -->
  <ellipse cx="357" cy="210" rx="38" ry="45" fill="url(#paw)" filter="url(#padglow)" opacity="0.9" transform="rotate(15, 357, 210)"/>
  <text x="347" y="218" font-family="monospace" font-size="22" font-weight="bold" fill="#0f0c29" opacity="0.6">}</text>

  <!-- Bottom text -->
  <text x="256" y="440" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#00f5d4" letter-spacing="6" opacity="0.9">OPEN-PAW</text>
  <text x="256" y="465" text-anchor="middle" font-family="monospace" font-size="12" fill="#7b2ff7" letter-spacing="4" opacity="0.7">LOCAL AI SWARM</text>
</svg>
